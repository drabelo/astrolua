name: Refresh weekly horoscopes

on:
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC (06:00 Brasília)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch API extras
        env:
          ASTROLOGY_API_KEY: ${{ secrets.ASTROLOGY_API_KEY }}
        run: node scripts/fetchApiExtras.mjs
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/api-extras.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Refresh weekly horoscopes"
            git push
          fi
